apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend-ns
spec:
  selector:
    matchLabels:
      app: backend
  replicas: 3
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: vsanthoshraj/k8s-backend:v1.0
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: be-secret
        - configMapRef:
            name: be-config
            